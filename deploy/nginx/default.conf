# Edge reverse proxy for the production stack.
#
# Cloudflare Tunnel terminates TLS at Cloudflare's edge and forwards plain HTTP
# to this container (cloudflared → proxy:80). One origin serves everything:
#   /api/        → NestJS backend  (global prefix is /api)
#   /socket.io/  → NestJS WebSocket gateway (realtime)
#   /health      → backend health probe
#   /            → React SPA (frontend container's nginx)

# WebSocket upgrade plumbing.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream backend_upstream {
    server backend:3000;
}

upstream frontend_upstream {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # Allow reasonably large request bodies (e.g. future uploads).
    client_max_body_size 10m;

    # Trust Cloudflare's proto header so the backend sees the real scheme.
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header Host              $host;

    # ── Backend API ──────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
    }

    # ── Backend health probe ───────────────────────────────────────────────────
    location = /health {
        proxy_pass http://backend_upstream;
    }

    # ── WebSocket (socket.io realtime) ─────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }

    # ── Frontend SPA (everything else) ─────────────────────────────────────────
    location / {
        proxy_pass http://frontend_upstream;
    }
}
