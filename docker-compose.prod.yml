# Production stack — deployed to the VPS by .github/workflows/deploy.yml.
#
# Differences from docker-compose.yml (the local/build stack):
#   - backend/frontend run from pre-built GHCR images (no build on the VPS)
#   - nothing is published to the host; the ONLY public entrypoint is Cloudflare
#     Tunnel (cloudflared) → nginx (proxy) → frontend / backend
#   - mongo stays internal to the docker network
#
# Run on the VPS:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  # ── MongoDB (internal only) ──────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: credit_card_mongo
    restart: unless-stopped
    # Cap WiredTiger's cache. Its default floor is 256 MB, which on a ~950 MB
    # host (shared with another stack) is enough to push the box into swap and
    # cause the huge BLOCK I/O seen in `docker stats`. 0.25 GB keeps it bounded.
    command: ["--wiredTigerCacheSizeGB", "0.25"]
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: credit-card-db
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      # A full mongosh spawn (~60 MB Node) every 10s is costly on a small host and
      # was flapping to `unhealthy` under memory pressure. Poll less often and give
      # it more slack so a brief GC/swap pause doesn't take mongo (and the backend
      # that gates on it) down.
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 40s
    networks:
      - app

  # ── NestJS Backend (image from GHCR) ──────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/haominhnguyen/card-pro-management/backend:latest}
    container_name: credit_card_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/credit-card-db
      # Prefer IPv4 when resolving outbound hosts (e.g. api.telegram.org). Many VPSes
      # lack working IPv6 egress, so Node's default would pick a dead AAAA route and
      # telegraf's getMe() fails with an empty FetchError reason.
      NODE_OPTIONS: --dns-result-order=ipv4first --max-old-space-size=192
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 96M
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app

  # ── React Frontend (image from GHCR, static via its own nginx) ────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/haominhnguyen/card-pro-management/frontend:latest}
    container_name: credit_card_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M
    networks:
      - app

  # ── Edge reverse proxy (single internal entrypoint) ───────────────────────────
  proxy:
    image: nginx:1.27-alpine
    container_name: credit_card_proxy
    restart: unless-stopped
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 48M
        reservations:
          memory: 16M
    networks:
      - app

  # ── Cloudflare Tunnel — the public door (no ports opened on the VPS) ──────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: credit_card_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - proxy
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  mongo_data:
    name: credit_card_mongo_data
  mongo_config:
    name: credit_card_mongo_config
