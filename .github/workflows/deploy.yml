name: Build & Deploy to VPS

# CI/CD pipeline:
#   1. build  — heavy Docker builds run on fast GitHub-hosted runners, images
#               pushed to GHCR (GitHub Container Registry) with layer caching.
#   2. deploy — a self-hosted runner ON THE VPS pulls those images and brings the
#               stack up via docker compose (Cloudflare Tunnel + nginx, no open ports).
#
# Triggers: every push to main, or manual dispatch.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once; let an in-flight deploy finish (don't cancel).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Fast build on GitHub-hosted runners → push to GHCR ────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR image names must be lowercase — normalise owner/repo.
      - name: Compute image base
        run: echo "IMAGE_BASE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/backend:latest
            ${{ env.IMAGE_BASE }}/backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          # Baked into the SPA at build time. Set repo Variable VITE_API_URL to your
          # public origin, e.g. https://card.yourdomain.com (same origin as the API).
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          tags: |
            ${{ env.IMAGE_BASE }}/frontend:latest
            ${{ env.IMAGE_BASE }}/frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ── Deploy on the VPS (self-hosted runner) ────────────────────────────────────
  deploy:
    needs: build
    runs-on: [self-hosted, vps]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image base
        run: echo "IMAGE_BASE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Assemble the runtime .env from secrets, then pin the exact image tags so the
      # deploy is immutable (matches the commit that triggered it).
      - name: Write production .env
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        run: |
          printf '%s\n' "$PROD_ENV_FILE" > .env
          {
            echo "CLOUDFLARE_TUNNEL_TOKEN=$CLOUDFLARE_TUNNEL_TOKEN"
            echo "BACKEND_IMAGE=${IMAGE_BASE}/backend:${GITHUB_SHA}"
            echo "FRONTEND_IMAGE=${IMAGE_BASE}/frontend:${GITHUB_SHA}"
          } >> .env

      - name: Pull images & start stack
        run: |
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.prod.yml exec -T backend wget -qO- http://localhost:3000/health >/dev/null 2>&1; then
              echo "Backend healthy."; exit 0
            fi
            sleep 3
          done
          echo "Backend did not become healthy in time." >&2
          docker compose -f docker-compose.prod.yml logs --tail=50 backend
          exit 1

      - name: Prune dangling images
        if: always()
        run: docker image prune -f
