name: Build & Deploy to VPS

# CI/CD pipeline:
#   1. build  — heavy Docker builds run on fast GitHub-hosted runners, images
#               pushed to GHCR (GitHub Container Registry) with layer caching.
#   2. deploy — a self-hosted runner ON THE VPS pulls those images and brings the
#               stack up via docker compose (Cloudflare Tunnel + nginx, no open ports).
#
# Triggers: every push to main, or manual dispatch.

on:
  push:
    branches: [main]
  workflow_dispatch:

# One run per branch: a newer push cancels the older in-flight run (build + deploy)
# so we never waste minutes building/deploying a commit that's already superseded.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast build on GitHub-hosted runners → push to GHCR ────────────────────────
  # backend & frontend build CONCURRENTLY (one runner each) so wall-clock ≈ the
  # slower of the two, not their sum. Each has its own gha cache scope.
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            build-args: ""
          - service: frontend
            context: ./frontend
            # Baked into the SPA at build time. Set repo Variable VITE_API_URL to your
            # public origin, e.g. https://card.yourdomain.com (same origin as the API).
            build-args: |
              VITE_API_URL=${{ vars.VITE_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR image names must be lowercase — normalise owner/repo.
      - name: Compute image base
        run: echo "IMAGE_BASE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          build-args: ${{ matrix.build-args }}
          tags: |
            ${{ env.IMAGE_BASE }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_BASE }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          # Single-arch image, no SLSA/SBOM attestations → faster export and a clean
          # single manifest (avoids the manifest-list that can trip `compose pull`).
          provenance: false
          sbom: false

  # ── Deploy on the VPS (self-hosted runner) ────────────────────────────────────
  deploy:
    needs: build
    runs-on: [self-hosted]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image base
        run: echo "IMAGE_BASE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Assemble the runtime .env from secrets, then pin the exact image tags so the
      # deploy is immutable (matches the commit that triggered it).
      - name: Write production .env
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        run: |
          printf '%s\n' "$PROD_ENV_FILE" > .env
          {
            echo "CLOUDFLARE_TUNNEL_TOKEN=$CLOUDFLARE_TUNNEL_TOKEN"
            echo "BACKEND_IMAGE=${IMAGE_BASE}/backend:${GITHUB_SHA}"
            echo "FRONTEND_IMAGE=${IMAGE_BASE}/frontend:${GITHUB_SHA}"
          } >> .env

      - name: Pull images & start stack
        run: |
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.prod.yml exec -T backend wget -qO- http://localhost:3000/health >/dev/null 2>&1; then
              echo "Backend healthy."; exit 0
            fi
            sleep 3
          done
          echo "Backend did not become healthy in time." >&2
          docker compose -f docker-compose.prod.yml logs --tail=50 backend
          exit 1

      - name: Prune dangling images
        if: always()
        run: docker image prune -f
